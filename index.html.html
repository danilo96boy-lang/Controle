<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestão Financeira Corporativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #0f172a; --card-bg: #1e293b; --border-color: #334155; --text-main: #f8fafc; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100dvh; overflow-x: hidden; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); }
        .input-corp { background: #020617; border: 1px solid var(--border-color); color: white; outline: none; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.3); border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-white mb-8 tracking-tighter">Financial Vault</h2>
            <form id="login-form" class="space-y-4 text-left">
                <input type="text" id="user" placeholder="Usuário" class="w-full p-3 input-corp rounded-lg">
                <input type="password" id="pass" placeholder="Senha" class="w-full p-3 input-corp rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Desbloquear</button>
            </form>
            <p id="login-msg" class="text-red-400 mt-4 hidden text-xs">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div id="app-container" class="max-w-7xl mx-auto w-full hidden p-4 lg:p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold">Painel Executivo • <span id="user-display" class="text-blue-400"></span></h1>
            <div class="flex items-center gap-4 bg-slate-900 p-2 rounded-xl border border-slate-800 shadow-lg">
                <button id="prev-month">◀</button>
                <span id="current-month" class="font-mono text-sm font-bold uppercase min-w-[140px] text-center"></span>
                <button id="next-month">▶</button>
            </div>
            <button id="logout-btn" class="text-slate-500 hover:text-red-400 text-sm">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                
                <div id="summary-display" class="space-y-4"></div>

                <div class="card rounded-2xl p-6">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-6 text-center tracking-widest">Distribuição de Gastos</h4>
                    <div class="relative h-64"><canvas id="expenseChart"></canvas></div>
                </div>

                <div class="card rounded-2xl p-6">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-6 text-center tracking-widest">Comparativo Mês Anterior</h4>
                    <div class="relative h-48"><canvas id="comparisonChart"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-8 card rounded-2xl flex flex-col overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
                    <h3 class="font-bold text-xl">Transações</h3>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest">Novo Lançamento</button>
                </div>
                <div class="p-4 bg-slate-950/50 border-b border-slate-800">
                    <input type="text" id="search-input" placeholder="Filtrar por descrição ou categoria..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:border-blue-500 transition outline-none">
                </div>
                <div id="expense-list" class="flex-1 overflow-y-auto min-h-[500px] divide-y divide-slate-800/50"></div>
                <div class="p-4 bg-slate-900/50 text-[10px] font-bold text-slate-500 uppercase text-right tracking-widest">
                    <span id="total-items-count">0 registros</span>
                </div>
            </div>
        </div>
    </div>

    <div id="expense-modal" class="fixed inset-0 bg-black/90 hidden z-50 items-center justify-center p-4 backdrop-blur-md">
        <div class="card w-full max-w-lg rounded-2xl p-6">
            <h3 class="font-bold text-white mb-6 uppercase text-sm tracking-widest">Lançamento</h3>
            <form id="expense-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="form-date" class="p-3 input-corp rounded-xl text-sm w-full">
                    <select id="form-cat" class="p-3 input-corp rounded-xl text-sm w-full"></select>
                </div>
                <input type="text" id="form-desc" placeholder="Descrição" class="w-full p-3 input-corp rounded-xl text-sm">
                <div class="relative">
                    <span class="absolute left-4 top-3 text-slate-500 font-mono text-sm">R$</span>
                    <input type="number" step="0.01" id="form-val" placeholder="0.00" class="w-full p-3 pl-12 input-corp rounded-xl text-sm font-mono font-bold text-white">
                </div>
                <div class="flex justify-between pt-4">
                    <button type="button" id="delete-btn" onclick="deleteItem()" class="text-red-500 text-[10px] font-bold uppercase tracking-widest hidden">Excluir</button>
                    <div class="flex gap-2 ml-auto">
                        <button type="button" onclick="closeModal('expense-modal')" class="px-5 py-2.5 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Cancelar</button>
                        <button type="submit" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-black uppercase tracking-widest">Gravar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBf1nzx6mH1lWckWQyXDnWZKLlh-5cfcv0",
            authDomain: "controle-a9909.firebaseapp.com",
            projectId: "controle-a9909",
            storageBucket: "controle-a9909.appspot.com",
            messagingSenderId: "43886457318",
            appId: "1:43886457318:web:289e82579a38c28fefa627"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const userId = 'casal_principal';
        const CATEGORIES = ['Mercado', 'Contas', 'Cartões', 'Apartamento', 'Carro', 'Lazer', 'Delivery', 'Posto', 'Farmácia', 'Roupa', 'Escola', 'Poupança Maria Luisa', 'Reserva', 'Outros'];
        const COLORS = { 'Mercado': '#f59e0b', 'Contas': '#ef4444', 'Cartões': '#3b82f6', 'Apartamento': '#6366f1', 'Carro': '#0ea5e9', 'Lazer': '#ec4899', 'Delivery': '#d946ef', 'Posto': '#f97316', 'Farmácia': '#84cc16', 'Roupa': '#14b8a6', 'Escola': '#8b5cf6', 'Poupança Maria Luisa': '#10b981', 'Reserva': '#22c55e', 'Outros': '#64748b' };
        
        const GOAL = 3000;
        let expenses = [], currentDate = new Date(), currentEditId = null, mainChart = null, compChart = null;

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if ((u === 'gabi' && p === '19071996') || (u === 'danilo' && p === '08042020')) {
                auth.signInAnonymously().then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('user-display').innerText = u;
                    init();
                });
            } else { document.getElementById('login-msg').classList.remove('hidden'); }
        };

        function init() {
            document.getElementById('form-cat').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
            loadData();
        }

        async function loadData() {
            toggleLoader(true);
            try {
                const snap = await db.collection('users').doc(userId).collection('expenses').get();
                expenses = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            } catch(e) { console.error(e); }
            toggleLoader(false);
        }

        function render(filter = '') {
            const monthKey = currentDate.toISOString().slice(0, 7);
            const prevDate = new Date(currentDate);
            prevDate.setMonth(prevDate.getMonth() - 1);
            const prevMonthKey = prevDate.toISOString().slice(0, 7);

            document.getElementById('current-month').innerText = currentDate.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
            
            let curExp = expenses.filter(e => e.date.startsWith(monthKey)).sort((a,b) => new Date(b.date) - new Date(a.date));
            let prevExp = expenses.filter(e => e.date.startsWith(prevMonthKey));

            if(filter) curExp = curExp.filter(e => e.description.toLowerCase().includes(filter.toLowerCase()) || e.category.toLowerCase().includes(filter.toLowerCase()));

            const despesasReais = curExp.filter(item => item.category !== 'Reserva');
            const despesasAnteriores = prevExp.filter(item => item.category !== 'Reserva');
            const itensReserva = curExp.filter(item => item.category === 'Reserva');

            const tExp = despesasReais.reduce((acc, item) => acc + item.value, 0);
            const tExpPrev = despesasAnteriores.reduce((acc, item) => acc + item.value, 0);
            const tRes = itensReserva.reduce((acc, item) => acc + item.value, 0);
            const progress = Math.min((tRes / GOAL) * 100, 100);

            // Resumo sem o card de Entradas
            document.getElementById('summary-display').innerHTML = `
                <div class="card p-5 rounded-2xl flex items-center justify-between border-l-4 border-red-500 bg-red-500/5">
                    <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Saídas (Despesas)</p><p class="text-xl font-mono font-bold text-white">${fmtMoney(tExp)}</p></div>
                    <div class="text-red-500 bg-red-500/10 p-2 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path></svg></div>
                </div>
                <div class="card p-5 rounded-2xl flex flex-col border-l-4 border-amber-500 bg-amber-500/5 gap-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Reservado (Meta ${fmtMoney(GOAL)})</p>
                            <p class="text-xl font-mono font-bold text-white">${fmtMoney(tRes)}</p>
                        </div>
                        <div class="text-amber-500 bg-amber-500/10 p-2 rounded-lg">
                           <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zM12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z" fill="currentColor"></svg>
                        </div>
                    </div>
                    <div class="w-full bg-slate-950 rounded-full h-2.5 overflow-hidden">
                        <div class="bg-amber-500 h-full transition-all duration-1000 ease-out" style="width: ${progress}%"></div>
                    </div>
                    <div class="flex justify-between items-center text-[10px] font-black font-mono">
                        <span class="text-amber-500 uppercase tracking-tighter">Status Reserva</span>
                        <span class="text-white">${progress.toFixed(1)}%</span>
                    </div>
                </div>
            `;

            document.getElementById('expense-list').innerHTML = curExp.map(item => `
                <div onclick="openModal('${item.id}')" class="flex items-center justify-between px-6 py-4 hover:bg-slate-800/40 cursor-pointer transition group">
                    <div class="flex items-center gap-4">
                        <div class="w-2.5 h-2.5 rounded-full" style="background-color:${COLORS[item.category]}; box-shadow: 0 0 8px ${COLORS[item.category]}"></div>
                        <div>
                            <p class="text-sm font-semibold text-slate-200 group-hover:text-white">${item.description}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">${item.category} • ${item.date.split('-').reverse().join('/')}</p>
                        </div>
                    </div>
                    <p class="font-mono text-sm font-bold text-slate-300 group-hover:text-white">${fmtMoney(item.value)}</p>
                </div>
            `).join('') || '<p class="p-10 text-center text-slate-600 text-xs">Sem movimentações</p>';
            
            document.getElementById('total-items-count').innerText = `${curExp.length} Registros`;
            updateMainChart(despesasReais);
            updateComparisonChart(tExp, tExpPrev);
        }

        function updateMainChart(data) {
            const canvas = document.getElementById('expenseChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if(mainChart) mainChart.destroy();
            const cats = {}; 
            data.forEach(d => cats[d.category] = (cats[d.category]||0) + d.value);
            if (Object.keys(cats).length === 0) return;
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: Object.keys(cats), 
                    datasets: [{ 
                        data: Object.values(cats), 
                        backgroundColor: Object.keys(cats).map(k=>COLORS[k]), 
                        borderWidth: 0,
                        hoverOffset: 10
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    cutout: '80%' 
                }
            });
        }

        function updateComparisonChart(currentTotal, prevTotal) {
            const ctx = document.getElementById('comparisonChart').getContext('2d');
            if(compChart) compChart.destroy();
            compChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Mês Anterior', 'Mês Atual'],
                    datasets: [{
                        label: 'Total de Gastos',
                        data: [prevTotal, currentTotal],
                        backgroundColor: ['#334155', '#3b82f6'],
                        borderRadius: 8,
                        barThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#64748b', font: { size: 10, weight: 'bold' } }
                        }
                    }
                }
            });
        }

        window.openModal = (id = null) => {
            currentEditId = id;
            document.getElementById('delete-btn').classList.toggle('hidden', !id);
            if(id) {
                const item = expenses.find(e => e.id === id);
                document.getElementById('form-date').value = item.date;
                document.getElementById('form-desc').value = item.description;
                document.getElementById('form-cat').value = item.category;
                document.getElementById('form-val').value = item.value;
            } else {
                document.getElementById('expense-form').reset();
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('expense-modal').classList.remove('hidden');
            document.getElementById('expense-modal').classList.add('flex');
        };

        window.closeModal = (id) => { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); };

        window.deleteItem = async () => {
            if(confirm("Excluir definitivamente?")) {
                await db.collection('users').doc(userId).collection('expenses').doc(currentEditId).delete();
                closeModal('expense-modal'); loadData();
            }
        };

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                date: document.getElementById('form-date').value,
                description: document.getElementById('form-desc').value,
                category: document.getElementById('form-cat').value,
                value: parseFloat(document.getElementById('form-val').value)
            };
            if(currentEditId) await db.collection('users').doc(userId).collection('expenses').doc(currentEditId).update(data);
            else await db.collection('users').doc(userId).collection('expenses').add(data);
            closeModal('expense-modal'); loadData();
        };

        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); render(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); render(); };
        document.getElementById('logout-btn').onclick = () => { auth.signOut(); location.reload(); };
        document.getElementById('search-input').oninput = (e) => render(e.target.value);
        function toggleLoader(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function fmtMoney(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
    </script>
</body>
</html>
