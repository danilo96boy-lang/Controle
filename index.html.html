<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-gray-600 text-sm font-medium mb-4 uppercase tracking-wider">Distribuição de Gastos</h3>
        <div class="relative h-64">
            <canvas id="currentMonthChart"></canvas>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-gray-600 text-sm font-medium mb-4 uppercase tracking-wider">Comparativo (Atual vs Anterior)</h3>
        <div class="relative h-64">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let doughnutChart;
let barChart;

// --- Plugin para escrever o Total no centro da Rosca ---
const centerTextPlugin = {
    id: 'centerText',
    afterDraw: (chart) => {
        if (chart.config.type !== 'doughnut') return;
        const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
        ctx.save();
        
        const total = chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
        const label = "TOTAL";
        const value = "R$ " + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Desenhar "TOTAL" (menor)
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = '#6B7280';
        ctx.fillText(label, left + width / 2, top + height / 2 - 10);

        // Desenhar o Valor (maior)
        ctx.font = 'bold 18px sans-serif';
        ctx.fillStyle = '#111827';
        ctx.fillText(value, left + width / 2, top + height / 2 + 10);
        ctx.restore();
    }
};

// Registrar o plugin globalmente
Chart.register(centerTextPlugin);

function updateCharts(dataAtual, dataAnterior) {
    // 1. ATUALIZAR GRÁFICO DE ROSCA (DISTRIBUIÇÃO)
    const ctxRosca = document.getElementById('currentMonthChart').getContext('2d');
    if (doughnutChart) doughnutChart.destroy();

    const categorias = dataAtual.map(d => d.categoria);
    const valores = dataAtual.map(d => d.valor);
    const totalGeral = valores.reduce((a, b) => a + b, 0);

    doughnutChart = new Chart(ctxRosca, {
        type: 'doughnut',
        data: {
            labels: categorias,
            datasets: [{
                data: valores,
                backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'],
                hoverOffset: 4,
                borderWidth: 2,
                cutout: '75%' // Deixa o buraco maior para o texto central
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const val = context.raw;
                            const percent = ((val / totalGeral) * 100).toFixed(1);
                            return ` R$ ${val.toLocaleString('pt-BR')} (${percent}%)`;
                        }
                    }
                }
            }
        }
    });

    // 2. ATUALIZAR GRÁFICO DE BARRAS (COMPARATIVO)
    const ctxBarra = document.getElementById('comparisonChart').getContext('2d');
    if (barChart) barChart.destroy();

    // Unir categorias únicas dos dois meses
    const todasCategorias = [...new Set([...dataAtual.map(d => d.categoria), ...dataAnterior.map(d => d.categoria)])];
    
    const seriesAtual = todasCategorias.map(cat => (dataAtual.find(d => d.categoria === cat)?.valor || 0));
    const seriesAnterior = todasCategorias.map(cat => (dataAnterior.find(d => d.categoria === cat)?.valor || 0));

    barChart = new Chart(ctxBarra, {
        type: 'bar',
        data: {
            labels: todasCategorias,
            datasets: [
                {
                    label: 'Mês Anterior',
                    data: seriesAnterior,
                    backgroundColor: '#E5E7EB',
                    borderRadius: 4
                },
                {
                    label: 'Mês Atual',
                    data: seriesAtual,
                    backgroundColor: '#3B82F6',
                    borderRadius: 4
                }
            ]
        },
        options: {
            indexAxis: 'y', // Barras horizontais são melhores para ler categorias
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            },
            scales: {
                x: { ticks: { callback: (v) => 'R$ ' + v } }
            }
        }
    });
}

// Exemplo de como chamar a função com seus dados:
// updateCharts(seusDadosMesAtual, seusDadosMesAnterior);
</script>
