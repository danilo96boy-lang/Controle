<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-8 text-center">Resumo de Gastos</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-gray-600 text-sm font-bold uppercase tracking-wider">Distribuição Atual</h3>
                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-semibold">Este Mês</span>
                </div>
                <div class="relative h-72">
                    <canvas id="currentMonthChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-gray-600 text-sm font-bold uppercase tracking-wider">Comparativo de Categorias</h3>
                    <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-semibold">Vs. Mês Anterior</span>
                </div>
                <div class="relative h-72">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- PLUGIN: Valor Total no Centro da Rosca ---
        const centerTextPlugin = {
            id: 'centerText',
            afterDraw: (chart) => {
                if (chart.config.type !== 'doughnut') return;
                const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
                ctx.save();
                
                const total = chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                const value = "R$ " + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Texto "Gasto Total"
                ctx.font = '600 12px sans-serif';
                ctx.fillStyle = '#9CA3AF';
                ctx.fillText('GASTO TOTAL', left + width / 2, top + height / 2 - 12);

                // Valor Central
                ctx.font = 'bold 20px sans-serif';
                ctx.fillStyle = '#1F2937';
                ctx.fillText(value, left + width / 2, top + height / 2 + 10);
                ctx.restore();
            }
        };

        Chart.register(centerTextPlugin);

        let doughnutChart;
        let barChart;

        // --- FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO ---
        function renderizarGraficos(dados) {
            // 1. Configuração do Gráfico de Rosca (Distribuição)
            const ctxRosca = document.getElementById('currentMonthChart').getContext('2d');
            if (doughnutChart) doughnutChart.destroy();

            const cats = dados.atual.map(d => d.categoria);
            const vals = dados.atual.map(d => d.valor);
            const somaTotal = vals.reduce((a, b) => a + b, 0);

            doughnutChart = new Chart(ctxRosca, {
                type: 'doughnut',
                data: {
                    labels: cats,
                    datasets: [{
                        data: vals,
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#06B6D4'],
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 10,
                        cutout: '75%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1F2937',
                            padding: 12,
                            callbacks: {
                                label: function(item) {
                                    let v = item.raw;
                                    let p = ((v / somaTotal) * 100).toFixed(1);
                                    return ` R$ ${v.toLocaleString('pt-BR')} (${p}%)`;
                                }
                            }
                        }
                    }
                }
            });

            // 2. Configuração do Gráfico de Barras (Comparativo)
            const ctxBarra = document.getElementById('comparisonChart').getContext('2d');
            if (barChart) barChart.destroy();

            // Pega todas as categorias únicas entre os dois meses
            const todasCats = [...new Set([...dados.atual.map(d => d.categoria), ...dados.anterior.map(d => d.categoria)])];
            
            const serieAtual = todasCats.map(c => (dados.atual.find(d => d.categoria === c)?.valor || 0));
            const serieAnterior = todasCats.map(c => (dados.anterior.find(d => d.categoria === c)?.valor || 0));

            barChart = new Chart(ctxBarra, {
                type: 'bar',
                data: {
                    labels: todasCats,
                    datasets: [
                        {
                            label: 'Anterior',
                            data: serieAnterior,
                            backgroundColor: '#E5E7EB',
                            borderRadius: 6
                        },
                        {
                            label: 'Atual',
                            data: serieAtual,
                            backgroundColor: '#3B82F6',
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                    },
                    scales: {
                        x: { 
                            grid: { display: false },
                            ticks: { callback: (v) => 'R$ ' + v }
                        },
                        y: { grid: { display: false } }
                    }
                }
            });
        }

        // --- MOCK DE DADOS (Substitua pela sua lógica de carregamento do banco/JSON) ---
        const dadosExemplo = {
            atual: [
                { categoria: 'Alimentação', valor: 1250.50 },
                { categoria: 'Aluguel', valor: 2200.00 },
                { categoria: 'Transporte', valor: 450.00 },
                { categoria: 'Lazer', valor: 320.00 },
                { categoria: 'Saúde', valor: 150.00 }
            ],
            anterior: [
                { categoria: 'Alimentação', valor: 1100.00 },
                { categoria: 'Aluguel', valor: 2200.00 },
                { categoria: 'Transporte', valor: 600.00 },
                { categoria: 'Lazer', valor: 200.00 },
                { categoria: 'Saúde', valor: 0 }
            ]
        };

        // Iniciar os gráficos ao carregar a página
        window.onload = () => renderizarGraficos(dadosExemplo);
    </script>
</body>
</html>
