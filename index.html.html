<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Financeiro • Danilo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --border: #1e293b; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background-color: var(--card); border: 1px solid var(--border); }
        .btn-value { @apply bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold active:bg-blue-600 active:text-white transition; }
        input, select { background: #000 !important; border: 1px solid var(--border) !important; color: white !important; outline: none; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #1e293b; border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Ajuste para mobile: lista sem scroll interno chato */
        @media (max-width: 768px) { #expense-list { min-height: auto !important; } }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-3xl font-black text-white mb-2 tracking-tighter">VAULT</h2>
            <p class="text-slate-500 text-sm mb-8 italic">Gestão Danilo Inácio</p>
            <form id="login-form" class="space-y-4">
                <input type="text" id="user" placeholder="Usuário" class="w-full p-4 rounded-xl">
                <input type="password" id="pass" placeholder="Senha" class="w-full p-4 rounded-xl">
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-sm">Entrar</button>
            </form>
            <p id="login-msg" class="text-red-500 mt-4 hidden text-xs font-bold">Acesso negado.</p>
        </div>
    </div>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div id="app-container" class="hidden pb-24"> <header class="p-4 lg:p-8 flex flex-col gap-4 max-w-5xl mx-auto">
            <div class="flex justify-between items-center">
                <span class="text-xs font-black uppercase tracking-widest text-slate-500">Fluxo Mensal</span>
                <button id="logout-btn" class="text-slate-600 text-xs uppercase font-bold">Sair</button>
            </div>
            
            <div class="flex items-center justify-between bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
                <button id="prev-month" class="p-3 text-blue-500 font-bold">◀</button>
                <span id="current-month" class="font-bold text-sm uppercase tracking-tighter"></span>
                <button id="next-month" class="p-3 text-blue-500 font-bold">▶</button>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 space-y-4">
            <div id="summary-display" class="grid grid-cols-2 gap-3"></div>

            <div class="card rounded-2xl p-4">
                <div class="relative h-48"><canvas id="expenseChart"></canvas></div>
            </div>

            <div class="card rounded-3xl overflow-hidden flex flex-col">
                <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Extrato Local</h3>
                    <div class="flex gap-2">
                         <button onclick="setFastFilter('gastos')" class="w-8 h-8 flex items-center justify-center bg-red-900/20 text-red-500 rounded-full text-xs">🛒</button>
                         <button onclick="setFastFilter('Reserva')" class="w-8 h-8 flex items-center justify-center bg-amber-900/20 text-amber-500 rounded-full text-xs">💰</button>
                         <button onclick="setFastFilter('all')" class="w-8 h-8 flex items-center justify-center bg-slate-800 text-slate-400 rounded-full text-xs">✕</button>
                    </div>
                </div>
                <div id="expense-list" class="divide-y divide-slate-800/50"></div>
            </div>
        </main>

        <button onclick="openModal()" class="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center text-3xl z-40 active:scale-95 transition-transform">
            +
        </button>
    </div>

    <div id="expense-modal" class="fixed inset-0 bg-black/95 hidden z-50 items-end lg:items-center justify-center p-4 backdrop-blur-sm">
        <div class="card w-full max-w-lg rounded-t-3xl lg:rounded-3xl p-6 mb-[-1rem] lg:mb-0">
            <div class="w-12 h-1.5 bg-slate-800 rounded-full mx-auto mb-6 lg:hidden"></div>
            <form id="expense-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="form-date" required class="p-4 rounded-xl text-sm w-full">
                    <select id="form-cat" class="p-4 rounded-xl text-sm w-full"></select>
                </div>
                <input type="text" id="form-desc" required placeholder="O que você comprou?" class="w-full p-4 rounded-xl text-sm">
                
                <div class="space-y-3">
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-500 font-bold">R$</span>
                        <input type="number" step="0.01" required id="form-val" placeholder="0,00" class="w-full p-4 pl-12 rounded-xl text-2xl font-black">
                    </div>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button type="button" onclick="addVal(50)" class="btn-value">R$ 50</button>
                        <button type="button" onclick="addVal(100)" class="btn-value">R$ 100</button>
                        <button type="button" onclick="addVal(200)" class="btn-value">R$ 200</button>
                        <button type="button" onclick="document.getElementById('form-val').value=''" class="btn-value text-red-400">Limpar</button>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('expense-modal')" class="flex-1 py-4 text-slate-500 font-bold">Cancelar</button>
                    <button type="submit" id="save-btn" class="flex-[2] bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-sm">Gravar</button>
                </div>
                <button type="button" id="delete-btn" onclick="deleteItem()" class="w-full text-red-900 text-[10px] font-black uppercase tracking-widest hidden">Excluir Registro</button>
            </form>
        </div>
    </div>

    <div id="cat-modal" class="fixed inset-0 bg-black/95 hidden z-[60] items-center justify-center p-6">
        <div class="card w-full max-w-md rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xs uppercase tracking-widest">Categorias</h3>
                <button onclick="closeModal('cat-modal')" class="text-slate-400 p-2">✕</button>
            </div>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="new-cat-name" placeholder="Nome..." class="flex-1 p-3 rounded-xl text-sm">
                    <button onclick="addNewCategory()" class="bg-blue-600 px-4 rounded-xl font-bold text-xs">ADD</button>
                </div>
                <div id="cat-list-admin" class="max-h-60 overflow-y-auto space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBf1nzx6mH1lWckWQyXDnWZKLlh-5cfcv0",
            authDomain: "controle-a9909.firebaseapp.com",
            projectId: "controle-a9909",
            storageBucket: "controle-a9909.appspot.com",
            messagingSenderId: "43886457318",
            appId: "1:43886457318:web:289e82579a38c28fefa627"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const userId = 'casal_principal';

        let categories = ['Mercado', 'Lazer', 'Delivery', 'Posto', 'Farmácia', 'Roupa', 'Escola', 'Carro', 'Reserva', 'Outros'];
        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
        
        let expenses = [], currentDate = new Date(), currentEditId = null, mainChart = null, unsubscribe = null;

        // Login simplified
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if ((u === 'gabi' && p === '19071996') || (u === 'danilo' && p === '08042020')) {
                auth.signInAnonymously().then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    init();
                });
            } else { document.getElementById('login-msg').classList.remove('hidden'); }
        };

        async function init() {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists && doc.data().customCategories) categories = doc.data().customCategories;
            updateCatDropdown();
            startListening();
        }

        function updateCatDropdown() {
            document.getElementById('form-cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function startListening() {
            toggleLoader(true);
            if(unsubscribe) unsubscribe();
            unsubscribe = db.collection('users').doc(userId).collection('expenses')
                .onSnapshot((snap) => {
                    expenses = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    render();
                    toggleLoader(false);
                }, () => { toggleLoader(false); });
        }

        function render(filter = "") {
            const monthKey = currentDate.toISOString().slice(0, 7);
            document.getElementById('current-month').innerText = currentDate.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
            
            let curExp = expenses.filter(e => e.date?.startsWith(monthKey)).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            if(filter && filter !== 'all' && filter !== 'gastos') {
                curExp = curExp.filter(e => e.category === filter);
            } else if (filter === 'gastos') {
                curExp = curExp.filter(e => e.category !== 'Reserva');
            }

            const totalCompras = curExp.filter(i => i.category !== 'Reserva').reduce((acc, i) => acc + (i.value || 0), 0);
            const totalReservaMes = curExp.filter(i => i.category === 'Reserva').reduce((acc, i) => acc + (i.value || 0), 0);

            document.getElementById('summary-display').innerHTML = `
                <div class="card p-4 rounded-2xl border-l-4 border-red-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Compras</p>
                    <p class="text-lg font-black">${fmtMoney(totalCompras)}</p>
                </div>
                <div class="card p-4 rounded-2xl border-l-4 border-amber-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Reserva (Mês)</p>
                    <p class="text-lg font-black text-amber-500">${fmtMoney(totalReservaMes)}</p>
                </div>
            `;

            document.getElementById('expense-list').innerHTML = curExp.map(i => `
                <div onclick="openModal('${i.id}')" class="flex items-center justify-between p-5 active:bg-slate-800 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg ${i.category === 'Reserva' ? 'bg-amber-900/20' : 'bg-slate-800'}">
                            ${i.category === 'Reserva' ? '💰' : '🛒'}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-200">${i.description}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${i.category} • ${i.date.split('-').reverse().slice(0,2).join('/')}</p>
                        </div>
                    </div>
                    <p class="font-black text-sm ${i.category === 'Reserva' ? 'text-amber-500' : 'text-slate-100'}">${fmtMoney(i.value)}</p>
                </div>
            `).join('') || '<p class="p-10 text-center text-slate-600 text-xs uppercase font-bold tracking-widest">Vazio</p>';
            
            updateChart(curExp.filter(i => i.category !== 'Reserva'));
        }

        window.addVal = (v) => {
            const input = document.getElementById('form-val');
            let current = parseFloat(input.value) || 0;
            input.value = current + v;
        };

        window.setFastFilter = (f) => render(f);

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(mainChart) mainChart.destroy();
            const cats = {}; data.forEach(d => cats[d.category] = (cats[d.category]||0) + d.value);
            if (Object.keys(cats).length === 0) return;
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: Object.keys(cats), 
                    datasets: [{ 
                        data: Object.values(cats), 
                        backgroundColor: COLORS, 
                        borderWidth: 0,
                        hoverOffset: 0 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: true, position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, usePointStyle: true } } }, 
                    cutout: '70%' 
                }
            });
        }

        document.getElementById('expense-form').onsubmit = function(e) {
            e.preventDefault();
            const data = {
                date: document.getElementById('form-date').value,
                description: document.getElementById('form-desc').value,
                category: document.getElementById('form-cat').value,
                value: parseFloat(document.getElementById('form-val').value)
            };
            const col = db.collection('users').doc(userId).collection('expenses');
            if (currentEditId) col.doc(currentEditId).set(data, { merge: true });
            else col.add(data);
            closeModal('expense-modal');
            this.reset();
            currentEditId = null;
        };

        window.openModal = (id = null) => {
            currentEditId = id;
            document.getElementById('delete-btn').classList.toggle('hidden', !id);
            if(id) {
                const i = expenses.find(e => e.id === id);
                document.getElementById('form-date').value = i.date;
                document.getElementById('form-desc').value = i.description;
                document.getElementById('form-cat').value = i.category;
                document.getElementById('form-val').value = i.value;
            } else {
                document.getElementById('expense-form').reset();
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('expense-modal').classList.remove('hidden').classList.add('flex');
        };

        window.closeModal = (id) => { document.getElementById(id).classList.add('hidden').classList.remove('flex'); };

        window.deleteItem = () => {
            if(confirm("Apagar registro?")) {
                db.collection('users').doc(userId).collection('expenses').doc(currentEditId).delete();
                closeModal('expense-modal');
            }
        };

        window.openCatModal = () => {
            renderAdminCats();
            document.getElementById('cat-modal').classList.remove('hidden').classList.add('flex');
        };

        function renderAdminCats() {
            document.getElementById('cat-list-admin').innerHTML = categories.map(c => `
                <div class="flex justify-between items-center bg-black p-4 rounded-2xl border border-slate-800">
                    <span class="text-sm font-bold">${c}</span>
                    <button onclick="removeCategory('${c}')" class="text-red-500">✕</button>
                </div>
            `).join('');
        }

        window.addNewCategory = async () => {
            const n = document.getElementById('new-cat-name').value.trim();
            if (n && !categories.includes(n)) {
                categories.push(n);
                await db.collection('users').doc(userId).set({ customCategories: categories }, { merge: true });
                document.getElementById('new-cat-name').value = '';
                renderAdminCats(); updateCatDropdown();
            }
        };

        window.removeCategory = async (n) => {
            categories = categories.filter(c => c !== n);
            await db.collection('users').doc(userId).set({ customCategories: categories }, { merge: true });
            renderAdminCats(); updateCatDropdown();
        };

        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); render(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); render(); };
        document.getElementById('logout-btn').onclick = () => { auth.signOut(); location.reload(); };
        function toggleLoader(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function fmtMoney(v) { return (v || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
    </script>
</body>
</html>
