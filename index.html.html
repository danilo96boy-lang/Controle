<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestão Financeira Corporativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #0f172a; --card-bg: #1e293b; --border-color: #334155; --text-main: #f8fafc; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100dvh; overflow-x: hidden; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); }
        .input-corp { background: #020617; border: 1px solid var(--border-color); color: white; outline: none; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 100; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.3); border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="antialiased">
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-white mb-8 tracking-tighter">Financial Vault</h2>
            <form id="login-form" class="space-y-4 text-left">
                <input type="text" id="user" placeholder="Usuário" class="w-full p-3 input-corp rounded-lg" autocapitalize="none">
                <input type="password" id="pass" placeholder="Senha" class="w-full p-3 input-corp rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold uppercase tracking-widest text-xs">Acessar Painel</button>
            </form>
            <p id="login-msg" class="text-red-400 mt-4 hidden text-xs bg-red-950/20 p-2 rounded border border-red-900/50">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div id="app-container" class="max-w-7xl mx-auto w-full hidden p-4 lg:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-xl font-bold">Painel Executivo • <span id="user-display" class="text-blue-400"></span></h1>
            <div class="flex items-center gap-4 bg-slate-900 p-2 rounded-xl border border-slate-800 shadow-lg">
                <button id="prev-month" class="px-2 hover:text-blue-400 transition">◀</button>
                <span id="current-month" class="font-mono text-sm font-bold uppercase min-w-[140px] text-center"></span>
                <button id="next-month" class="px-2 hover:text-blue-400 transition">▶</button>
            </div>
            <button id="logout-btn" class="text-slate-500 hover:text-red-400 text-sm font-bold">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div id="summary-display" class="space-y-4"></div>

                <div class="card rounded-2xl p-6 text-center">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Distribuição de Gastos Reais</h4>
                    <div class="relative h-64"><canvas id="currentMonthChart"></canvas></div>
                </div>

                <div class="card rounded-2xl p-6">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4 text-center tracking-widest">Evolução por Categoria (vs Anterior)</h4>
                    <div class="relative h-80"><canvas id="categoryComparisonChart"></canvas></div>
                </div>

                <div class="card rounded-2xl p-6">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Receita Mensal</h3>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input type="number" id="income1" placeholder="Gabi" class="bg-slate-950 p-2 rounded-lg text-xs border border-slate-800">
                        <input type="number" id="income2" placeholder="Danilo" class="bg-slate-950 p-2 rounded-lg text-xs border border-slate-800">
                    </div>
                    <button id="save-income" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-2 rounded-lg transition uppercase tracking-widest">Salvar Receitas</button>
                </div>
            </div>

            <div class="lg:col-span-8 card rounded-2xl flex flex-col overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
                    <h3 class="font-bold text-xl">Transações</h3>
                    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest">Novo</button>
                </div>
                <div class="p-4 bg-slate-950/50 border-b border-slate-800">
                    <input type="text" id="search-input" placeholder="Filtrar lançamentos..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                </div>
                <div id="expense-list" class="flex-1 overflow-y-auto min-h-[600px] divide-y divide-slate-800/50 custom-scroll"></div>
            </div>
        </div>
    </div>

    <div id="expense-modal" class="fixed inset-0 bg-black/90 hidden z-50 items-center justify-center p-4 backdrop-blur-md">
        <div class="card w-full max-w-lg rounded-2xl p-6 border-slate-700">
            <h3 class="font-bold text-white mb-6 uppercase text-sm tracking-widest">Lançamento</h3>
            <form id="expense-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="form-date" class="p-3 input-corp rounded-xl text-sm w-full">
                    <select id="form-cat" class="p-3 input-corp rounded-xl text-sm w-full"></select>
                </div>
                <input type="text" id="form-desc" placeholder="Descrição" class="w-full p-3 input-corp rounded-xl text-sm">
                <div class="relative">
                    <span class="absolute left-4 top-3 text-slate-500 font-mono text-sm">R$</span>
                    <input type="number" step="0.01" id="form-val" placeholder="0.00" class="w-full p-3 pl-12 input-corp rounded-xl text-sm font-mono font-bold text-white">
                </div>
                <div class="flex justify-between pt-4">
                    <button type="button" id="delete-btn" onclick="deleteItem()" class="text-red-500 text-[10px] font-bold uppercase tracking-widest hidden">Excluir</button>
                    <div class="flex gap-2 ml-auto">
                        <button type="button" onclick="closeModal('expense-modal')" class="px-5 py-2.5 bg-slate-800 text-white rounded-xl text-xs">Cancelar</button>
                        <button type="submit" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold uppercase">Gravar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBf1nzx6mH1lWckWQyXDnWZKLlh-5cfcv0",
            authDomain: "controle-a9909.firebaseapp.com",
            projectId: "controle-a9909",
            storageBucket: "controle-a9909.appspot.com",
            messagingSenderId: "43886457318",
            appId: "1:43886457318:web:289e82579a38c28fefa627"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const userId = 'casal_principal';
        const CATEGORIES = ['Mercado', 'Contas', 'Cartões', 'Apartamento', 'Carro', 'Lazer', 'Delivery', 'Posto', 'Farmácia', 'Roupa', 'Escola', 'Poupança Maria Luisa', 'Reserva', 'Outros'];
        const COLORS = { 'Mercado': '#f59e0b', 'Contas': '#ef4444', 'Cartões': '#3b82f6', 'Apartamento': '#6366f1', 'Carro': '#0ea5e9', 'Lazer': '#ec4899', 'Delivery': '#d946ef', 'Posto': '#f97316', 'Farmácia': '#84cc16', 'Roupa': '#14b8a6', 'Escola': '#8b5cf6', 'Poupança Maria Luisa': '#10b981', 'Reserva': '#22c55e', 'Outros': '#64748b' };
        
        const GOAL = 3000;
        let expenses = [], incomeData = {}, currentDate = new Date(), currentEditId = null;
        let chartRosca = null, chartCat = null;

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if ((u === 'gabi' && p === '19071996') || (u === 'danilo' && p === '08042020')) {
                auth.signInAnonymously().then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('user-display').innerText = u;
                    init();
                });
            } else { document.getElementById('login-msg').classList.remove('hidden'); }
        };

        function init() {
            document.getElementById('form-cat').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
            loadData();
        }

        async function loadData() {
            toggleLoader(true);
            try {
                const snap = await db.collection('users').doc(userId).collection('expenses').get();
                expenses = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const incSnap = await db.collection('users').doc(userId).collection('income').get();
                incomeData = {}; incSnap.forEach(d => incomeData[d.id] = d.data());
                render();
            } catch(e) { console.error(e); }
            toggleLoader(false);
        }

        function render(filter = '') {
            const monthKey = currentDate.toISOString().slice(0, 7);
            const prevDate = new Date(currentDate); prevDate.setMonth(prevDate.getMonth() - 1);
            const prevMonthKey = prevDate.toISOString().slice(0, 7);

            document.getElementById('current-month').innerText = currentDate.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
            
            let curExp = expenses.filter(e => e.date.startsWith(monthKey)).sort((a,b) => new Date(b.date) - new Date(a.date));
            if(filter) curExp = curExp.filter(e => e.description.toLowerCase().includes(filter.toLowerCase()) || e.category.toLowerCase().includes(filter.toLowerCase()));

            const inc = incomeData[monthKey] || {s1:0, s2:0};
            document.getElementById('income1').value = inc.s1;
            document.getElementById('income2').value = inc.s2;

            // Filtros para cálculos
            const despesasReais = curExp.filter(item => item.category !== 'Reserva');
            // MUDANÇA AQUI: Reserva agora é filtrada apenas pelo mês atual
            const reservaDoMes = curExp.filter(item => item.category === 'Reserva').reduce((acc, item) => acc + item.value, 0);

            const tInc = (parseFloat(inc.s1)||0) + (parseFloat(inc.s2)||0);
            const tExp = despesasReais.reduce((acc, item) => acc + item.value, 0);
            const progress = Math.min((reservaDoMes / GOAL) * 100, 100);

            document.getElementById('summary-display').innerHTML = `
                <div class="card p-5 rounded-2xl border-l-4 border-emerald-500 bg-emerald-500/5 flex justify-between items-center shadow-inner">
                    <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Entradas</p><p class="text-xl font-mono font-bold text-white">${fmtMoney(tInc)}</p></div>
                </div>
                <div class="card p-5 rounded-2xl border-l-4 border-red-500 bg-red-500/5 flex justify-between items-center shadow-inner">
                    <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Saídas (Despesas)</p><p class="text-xl font-mono font-bold text-white">${fmtMoney(tExp)}</p></div>
                </div>
                <div class="card p-5 rounded-2xl border-l-4 border-amber-500 bg-amber-500/5 flex flex-col gap-4 shadow-inner">
                    <div class="flex justify-between items-center">
                        <div><p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Reserva do Mês (Meta ${fmtMoney(GOAL)})</p><p class="text-xl font-mono font-bold text-white">${fmtMoney(reservaDoMes)}</p></div>
                    </div>
                    <div class="w-full bg-slate-950 rounded-full h-2 overflow-hidden shadow-inner">
                        <div class="bg-amber-500 h-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(245,158,11,0.5)]" style="width: ${progress}%"></div>
                    </div>
                    <p class="text-right text-[10px] font-black font-mono text-white">${progress.toFixed(1)}% do objetivo mensal</p>
                </div>
            `;

            document.getElementById('expense-list').innerHTML = curExp.map(item => `
                <div onclick="openModal('${item.id}')" class="flex items-center justify-between px-6 py-4 hover:bg-slate-800/40 cursor-pointer transition group">
                    <div class="flex items-center gap-4">
                        <div class="w-2.5 h-2.5 rounded-full" style="background-color:${COLORS[item.category] || '#3b82f6'}; box-shadow: 0 0 8px ${COLORS[item.category]}"></div>
                        <div>
                            <p class="text-sm font-semibold text-slate-200 group-hover:text-white">${item.description || item.category}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${item.category} • ${item.date.split('-').reverse().join('/')}</p>
                        </div>
                    </div>
                    <p class="font-mono text-sm font-bold text-slate-300 group-hover:text-white">${fmtMoney(item.value)}</p>
                </div>
            `).join('') || '<p class="p-10 text-center text-slate-600 text-xs uppercase tracking-widest">Sem movimentações</p>';
            
            updateRosca(despesasReais);
            updateComparativoCategorias(monthKey, prevMonthKey);
        }

        function updateRosca(data) {
            const ctx = document.getElementById('currentMonthChart').getContext('2d');
            if(chartRosca) chartRosca.destroy();
            const cats = {}; data.forEach(d => cats[d.category] = (cats[d.category]||0) + d.value);
            if(Object.keys(cats).length === 0) return;
            chartRosca = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: Object.keys(cats).map(k=>COLORS[k]), borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '70%' }
            });
        }

        function updateComparativoCategorias(currMonth, prevMonth) {
            const ctx = document.getElementById('categoryComparisonChart').getContext('2d');
            if(chartCat) chartCat.destroy();
            const catsToCompare = CATEGORIES.filter(c => c !== 'Reserva');
            const dataCurrent = catsToCompare.map(c => expenses.filter(e => e.date.startsWith(currMonth) && e.category === c).reduce((a,b) => a + b.value, 0));
            const dataPrev = catsToCompare.map(c => expenses.filter(e => e.date.startsWith(prevMonth) && e.category === c).reduce((a,b) => a + b.value, 0));
            const labels = []; const cData = []; const pData = [];
            catsToCompare.forEach((c, i) => { if(dataCurrent[i] > 0 || dataPrev[i] > 0) { labels.push(c); cData.push(dataCurrent[i]); pData.push(dataPrev[i]); } });

            chartCat = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Ant.', data: pData, backgroundColor: 'rgba(148, 163, 184, 0.4)', borderRadius: 3 }, { label: 'Atu.', data: cData, backgroundColor: '#3b82f6', borderRadius: 3 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        document.getElementById('save-income').onclick = async () => {
            const monthKey = currentDate.toISOString().slice(0, 7);
            const s1 = document.getElementById('income1').value;
            const s2 = document.getElementById('income2').value;
            await db.collection('users').doc(userId).collection('income').doc(monthKey).set({s1, s2});
            loadData();
        };

        window.openModal = (id = null) => {
            currentEditId = id;
            document.getElementById('delete-btn').classList.toggle('hidden', !id);
            if(id) {
                const item = expenses.find(e => e.id === id);
                document.getElementById('form-date').value = item.date;
                document.getElementById('form-desc').value = item.description || '';
                document.getElementById('form-cat').value = item.category;
                document.getElementById('form-val').value = item.value;
            } else {
                document.getElementById('expense-form').reset();
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('expense-modal').classList.remove('hidden').classList.add('flex');
        };

        window.closeModal = (id) => { document.getElementById(id).classList.remove('flex').classList.add('hidden'); };
        window.deleteItem = async () => { if(confirm("Excluir definitivamente?")) { await db.collection('users').doc(userId).collection('expenses').doc(currentEditId).delete(); closeModal('expense-modal'); loadData(); } };
        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = { date: document.getElementById('form-date').value, description: document.getElementById('form-desc').value, category: document.getElementById('form-cat').value, value: parseFloat(document.getElementById('form-val').value) };
            if(currentEditId) await db.collection('users').doc(userId).collection('expenses').doc(currentEditId).update(data);
            else await db.collection('users').doc(userId).collection('expenses').add(data);
            closeModal('expense-modal'); loadData();
        };
        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); loadData(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); loadData(); };
        document.getElementById('logout-btn').onclick = () => { auth.signOut(); location.reload(); };
        document.getElementById('search-input').oninput = (e) => render(e.target.value);
        function toggleLoader(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function fmtMoney(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
    </script>
</body>
</html>
