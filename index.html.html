<div id="app-container" class="max-w-7xl mx-auto w-full hidden p-4 lg:p-8">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-xl font-bold tracking-tight">Painel Executivo • <span id="user-display" class="text-blue-400"></span></h1>
        <div class="flex items-center gap-4 bg-slate-900/80 p-2 rounded-2xl border border-slate-800 shadow-2xl backdrop-blur-sm">
            <button id="prev-month" class="hover:text-blue-400 transition-colors px-2">◀</button>
            <span id="current-month" class="font-mono text-sm font-black uppercase min-w-[160px] text-center tracking-tighter"></span>
            <button id="next-month" class="hover:text-blue-400 transition-colors px-2">▶</button>
        </div>
        <button id="logout-btn" class="text-slate-500 hover:text-red-400 text-xs font-bold uppercase tracking-widest transition-colors">Sair</button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
        <div class="lg:col-span-4 space-y-8">
            <div class="card rounded-[2rem] p-8 shadow-xl">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-[0.2em]">Gestão de Receita</h3>
                <div class="space-y-3">
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-600 text-xs font-bold">GABI</span>
                        <input type="number" id="income1" class="w-full bg-slate-950 pl-16 p-3.5 rounded-xl text-sm border border-slate-800 focus:border-blue-500 outline-none transition-all font-mono">
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-600 text-xs font-bold">DANILO</span>
                        <input type="number" id="income2" class="w-full bg-slate-950 pl-16 p-3.5 rounded-xl text-sm border border-slate-800 focus:border-blue-500 outline-none transition-all font-mono">
                    </div>
                    <button id="save-income" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black py-4 rounded-xl uppercase tracking-[0.15em] transition-all shadow-lg shadow-blue-900/20">Atualizar Receitas</button>
                </div>
            </div>
            <div id="summary-display" class="space-y-6"></div>
        </div>

        <div class="lg:col-span-8 card rounded-[2rem] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-slate-800/50 bg-slate-900/20 flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-2xl tracking-tight">Transações</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1" id="total-items-count">0 registros</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40">Novo Lançamento</button>
            </div>
            <div class="px-8 py-5 bg-slate-950/30 border-b border-slate-800/50">
                <input type="text" id="search-input" placeholder="Pesquisar por descrição ou categoria..." class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-blue-500 transition-all outline-none italic text-slate-400">
            </div>
            <div id="expense-list" class="flex-1 overflow-y-auto min-h-[500px] max-h-[750px] scrollbar-hide">
                </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 pb-12">
        <div class="card rounded-[2.5rem] p-10 flex flex-col items-center">
            <h4 class="text-[10px] font-black text-slate-500 uppercase mb-10 tracking-[0.2em]">Distribuição de Despesas</h4>
            <div class="relative w-full h-[320px]"><canvas id="expenseChart"></canvas></div>
        </div>
        <div class="card rounded-[2.5rem] p-10 flex flex-col items-center">
            <h4 class="text-[10px] font-black text-slate-500 uppercase mb-10 tracking-[0.2em]">Performance vs Mês Anterior</h4>
            <div class="relative w-full h-[320px]"><canvas id="comparisonChart"></canvas></div>
        </div>
    </div>
</div>
